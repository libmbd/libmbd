name: Trigger Docs Deploy
on:
  workflow_run:
    workflows: [Tests, Lint, Documentation]
    types: [completed]
permissions:
  contents: read
  actions: read
concurrency:
  group: doc-deploy-trigger
  cancel-in-progress: false
jobs:
  trigger:
    name: Trigger deploy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master' && github.repository == 'libmbd/libmbd'
    steps:
      - name: Check all CI passed
        id: gate
        uses: actions/github-script@v9
        with:
          script: |
            const trigger = context.payload.workflow_run;
            const sha = trigger.head_sha;
            const required = ['Tests', 'Lint', 'Documentation'];
            const { data: { workflow_runs } } = await github.rest.actions
              .listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                per_page: 100,
              });
            for (const name of required) {
              const runs = workflow_runs
                .filter(r => r.name === name)
                .sort((a, b) => b.id - a.id);
              const run = runs[0];
              if (!run || run.status !== 'completed' || run.conclusion !== 'success') {
                core.info(`${name}: ${run ? (run.conclusion ?? run.status) : 'not found'} - skipping`);
                core.setOutput('ok', 'false');
                return;
              }
            }
            core.setOutput('ok', 'true');
      - name: Trigger docs deployment
        if: steps.gate.outputs.ok == 'true'
        env:
          DOC_DEPLOY_TRIGGER_TOKEN: ${{ secrets.DOC_DEPLOY_TRIGGER_TOKEN }}
        run: |
          curl -sS --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "Authorization: token $DOC_DEPLOY_TRIGGER_TOKEN" \
            https://api.github.com/repos/libmbd/libmbd.github.io/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"master"}'
