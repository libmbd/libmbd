name: Documentation
on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.repository == 'libmbd/libmbd'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Install Poetry
        run: |
          pipx install poetry
          pipx inject poetry poetry-dynamic-versioning
      - name: Build documentation
        run: make build_doc VIRTUAL_ENV=none
  deploy:
    name: Trigger deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'libmbd/libmbd'
    steps:
      - name: Trigger docs deployment
        env:
          DOC_DEPLOY_TRIGGER_TOKEN: ${{ secrets.DOC_DEPLOY_TRIGGER_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $DOC_DEPLOY_TRIGGER_TOKEN" \
            https://api.github.com/repos/libmbd/libmbd.github.io/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"master"}'
