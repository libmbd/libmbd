name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/publish.yaml'
  push:
    paths:
      - '.github/workflows/publish.yaml'
jobs:
  build:
    name: Build sdist
    if: github.repository == 'libmbd/libmbd' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # poetry-dynamic-versioning derives the version from Git tags, so the
          # full history (and tags) must be available.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      # pyMBD's C extension is built against an external libMBD at install time,
      # so PyPI only carries the source distribution -- a binary wheel would
      # bake in one libMBD build and break for everyone else.
      - name: Build sdist
        run: python -m build --sdist
      - name: Check metadata
        run: twine check --strict dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
  publish:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' && github.repository == 'libmbd/libmbd'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pymbd/
    permissions:
      # Mint a short-lived OIDC token for PyPI trusted publishing; no API token
      # secret is stored in the repository.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
