name: Release
# Cut a release when a PR labelled `release` is merged into master. The merged
# PR is expected to have moved its entries from the CHANGELOG's [Unreleased]
# section into a new "## [X.Y.Z]" section; that heading is the single source of
# truth for the version. The workflow then:
#
#   prepare  read the version from the changelog, tag the merge commit
#   build    reuse Build distributions to build the pyMBD sdist + libMBD archive
#   publish  create a DRAFT GitHub Release, attach the archives, upload to PyPI,
#            and only then publish the release
#
# Building the assets *before* the release is published is what makes this
# compatible with GitHub immutable releases: an immutable release is frozen at
# publish time, so every asset must already be attached to the draft. The old
# flow (publish first, attach assets afterwards via `gh release upload`) cannot
# satisfy that.
on:
  pull_request:
    types: [closed]
  # Manual escape hatch to re-run a release whose merge already landed (e.g. a
  # transient PyPI failure). The changelog still supplies the version.
  workflow_dispatch:
jobs:
  prepare:
    name: Prepare tag
    if: >-
      github.repository == 'libmbd/libmbd' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'release')))
    runs-on: ubuntu-latest
    permissions:
      # Push the release tag.
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the exact merge commit the release PR produced, not the
          # ephemeral refs/pull/N/merge ref that a pull_request event defaults
          # to, and not master's moving HEAD. On workflow_dispatch there is no
          # merge commit, so fall back to the branch the run was dispatched from.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0
      - name: Read version from changelog
        id: version
        run: |
          version=$(bash devtools/changelog.sh version)
          echo "Releasing version $version"
          echo "version=$version" >>"$GITHUB_OUTPUT"
      - name: Extract release notes
        run: bash devtools/changelog.sh notes "${{ steps.version.outputs.version }}" >release-notes.md
      # A fresh release (merge trigger) must not reuse an existing tag: that
      # almost always means the changelog was not bumped. A manual re-run
      # (workflow_dispatch) is the deliberate resume path, so it is allowed to
      # find the tag already there.
      - name: Guard against re-releasing an existing tag
        if: github.event_name == 'pull_request'
        run: |
          tag="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists. Add a new '## [X.Y.Z]' section to CHANGELOG.md before releasing." >&2
            exit 1
          fi
      - name: Create and push tag
        run: |
          tag="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; reusing it (resume)."
          else
            git tag "$tag"
            git push origin "refs/tags/$tag"
          fi
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
  build:
    name: Build
    needs: prepare
    permissions:
      # Minimum for actions/checkout of the tag.
      contents: read
    # Build the artifacts on the tag just created, so the version baked into the
    # sdist and the libMBD source archive matches the release.
    uses: ./.github/workflows/build-dist.yaml
    with:
      ref: ${{ needs.prepare.outputs.tag }}
  publish:
    name: Publish to PyPI and GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pymbd/
    permissions:
      # Mint a short-lived OIDC token for PyPI trusted publishing; no API token
      # secret is stored in the repository.
      id-token: write
      # Create the release and attach the source archives.
      contents: write
    steps:
      # pyMBD sdist and the libMBD source archive land in separate directories:
      # only the sdist goes to PyPI, while both are attached to the GitHub
      # Release. A binary wheel is deliberately never built or published -- the C
      # extension links an external libMBD at install time.
      - name: Download pyMBD sdist
        uses: actions/download-artifact@v4
        with:
          name: pymbd-sdist
          path: pypi-dist
      - name: Download libMBD source archive
        uses: actions/download-artifact@v4
        with:
          name: libmbd-sdist
          path: gh-dist
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
      # Create the release as a DRAFT and attach both source archives while it is
      # still mutable. GitHub adds its auto-generated source code archives on top.
      # If a draft from an interrupted run already exists, re-attach the assets
      # instead of failing (safe: the release is still a draft, hence mutable).
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; re-attaching assets (resume)."
            gh release upload "$TAG" pypi-dist/*.tar.gz gh-dist/*.tar.gz --clobber
          else
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file release-notes.md \
              pypi-dist/*.tar.gz gh-dist/*.tar.gz
          fi
      # PyPI uploads are immutable; skip-existing keeps a manual re-run safe by
      # no-opping already-published files instead of erroring. Only the pyMBD
      # sdist is uploaded -- the libMBD source archive never goes to PyPI.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          packages-dir: pypi-dist
      # Flip the fully-populated draft to published. If immutable releases are
      # enabled on the repo, the release is frozen here with all assets in place.
      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
