name: Release
# Cut a release DRAFT when a PR labelled `release` is merged into master. The
# merged PR is expected to have moved its entries from the CHANGELOG's
# [Unreleased] section into a new "## [X.Y.Z]" section; that heading is the
# single source of truth for the version. The workflow then:
#
#   prepare  read the version from the changelog, tag the merge commit
#   build    reuse Build distributions to build the pyMBD sdist + libMBD archive
#   draft    create a DRAFT GitHub Release with both archives attached
#
# The workflow stops at a draft on purpose: a maintainer reviews it and
# publishes it by hand. Publishing then triggers the Publish workflow
# (.github/workflows/publish.yaml), which uploads the sdist to PyPI.
#
# Attaching every asset to the draft *before* it is published is what makes this
# compatible with GitHub immutable releases: an immutable release is frozen at
# publish time, so every asset must already be in place. Nothing here modifies a
# published release.
on:
  pull_request:
    types: [closed]
  # Manual escape hatch to (re)build the draft for a release whose merge already
  # landed. The changelog still supplies the version.
  workflow_dispatch:
jobs:
  prepare:
    name: Prepare tag
    if: >-
      github.repository == 'libmbd/libmbd' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'release')))
    runs-on: ubuntu-latest
    permissions:
      # Push the release tag.
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the exact merge commit the release PR produced, not the
          # ephemeral refs/pull/N/merge ref that a pull_request event defaults
          # to, and not master's moving HEAD. On workflow_dispatch there is no
          # merge commit, so fall back to the branch the run was dispatched from.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0
      - name: Read version from changelog
        id: version
        run: |
          version=$(bash devtools/changelog.sh version)
          echo "Releasing version $version"
          echo "version=$version" >>"$GITHUB_OUTPUT"
      - name: Extract release notes
        run: bash devtools/changelog.sh notes "${{ steps.version.outputs.version }}" >release-notes.md
      # A fresh release (merge trigger) must not reuse an existing tag: that
      # almost always means the changelog was not bumped. A manual re-run
      # (workflow_dispatch) is the deliberate resume path, so it is allowed to
      # find the tag already there.
      - name: Guard against re-releasing an existing tag
        if: github.event_name == 'pull_request'
        run: |
          tag="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists. Add a new '## [X.Y.Z]' section to CHANGELOG.md before releasing." >&2
            exit 1
          fi
      - name: Create and push tag
        run: |
          tag="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; reusing it (resume)."
          else
            git tag "$tag"
            git push origin "refs/tags/$tag"
          fi
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
  build:
    name: Build
    needs: prepare
    permissions:
      # Minimum for actions/checkout of the tag.
      contents: read
    # Build the artifacts on the tag just created, so the version baked into the
    # sdist and the libMBD source archive matches the release.
    uses: ./.github/workflows/build-dist.yaml
    with:
      ref: ${{ needs.prepare.outputs.tag }}
  draft:
    name: Create draft GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      # Create the release and attach the source archives.
      contents: write
    steps:
      # pyMBD sdist and the libMBD source archive are both attached to the
      # Release; only the sdist later goes to PyPI (from the Publish workflow).
      - name: Download pyMBD sdist
        uses: actions/download-artifact@v4
        with:
          name: pymbd-sdist
          path: dist
      - name: Download libMBD source archive
        uses: actions/download-artifact@v4
        with:
          name: libmbd-sdist
          path: dist
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
      # Create the release as a DRAFT with both source archives attached while it
      # is still mutable. GitHub adds its auto-generated source code archives on
      # top. A maintainer reviews and publishes it by hand. If a draft from an
      # interrupted run already exists, re-attach the assets instead of failing
      # (safe: it is still a draft, hence mutable).
      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; re-attaching assets (resume)."
            gh release upload "$TAG" dist/*.tar.gz --clobber
          else
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file release-notes.md \
              dist/*.tar.gz
          fi
      - name: Summary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          {
            echo "## Draft release $TAG created"
            echo
            echo "Review it and publish it by hand to upload $TAG to PyPI."
            echo "https://github.com/${{ github.repository }}/releases"
          } >>"$GITHUB_STEP_SUMMARY"
