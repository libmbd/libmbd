[tool:pytest]
norecursedirs = tests/pymbd_testutils
filterwarnings =
    ignore::PendingDeprecationWarning
markers =
    no_scalapack: test doesn't work with ScaLAPACK

[coverage:run]
branch = true
source = pymbd
parallel = true
omit =
    */pymbd/tensorflow.py
    */pymbd/benchmark.py

# Map the installed (non-editable) package back onto the source tree so the
# combined report and coverage.xml use src/pymbd/... paths regardless of how
# pyMBD was installed.
[coverage:paths]
source =
    src/pymbd
    */site-packages/pymbd
    */pymbd
